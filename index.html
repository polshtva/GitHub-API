<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Explorer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">

    <div class="max-w-3xl mx-auto px-4 py-10">

        <!-- Card -->
        <div class="glass rounded-3xl border border-white/40 shadow-lg overflow-hidden">

            <!-- Header -->
            <div class="px-8 py-6 border-b border-gray-200">
                <h1 class="text-3xl font-semibold text-gray-800 tracking-tight">
                    GitHub Explorer
                </h1>
                <p class="text-gray-500 text-sm mt-1">
                    Найди профиль по нику
                </p>
            </div>

            <!-- Content -->
            <div class="p-8">

                <!-- Search -->
                <form id="search-form" class="flex gap-3 mb-8">
                    <input id="search-input" type="text" placeholder="например: octocat" class="flex-grow px-5 py-3 rounded-2xl bg-white border border-gray-200 
                    focus:border-blue-400 outline-none smooth shadow-sm text-gray-700">

                    <button type="submit" class="px-6 py-3 rounded-2xl bg-black text-white 
                    hover:bg-gray-800 active:scale-95 smooth">
                        Найти
                    </button>
                </form>

                <!-- Result -->
                <div id="search-res" class="mb-10">

                    <div id="result-placeholder" class="text-center py-12 rounded-2xl bg-white border border-gray-200">
                        <p class="text-gray-500 text-lg">Пока пусто</p>
                        <p class="text-gray-400 text-sm mt-1">
                            Введи ник пользователя
                        </p>
                    </div>

                    <div id="dynamic-content"></div>
                </div>

                <!-- History -->
                <div class="pt-6 border-t border-gray-200">

                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-800">
                            Недавние запросы
                        </h3>

                        <button id="clear-history-btn" class="text-sm text-gray-400 hover:text-red-500 smooth">
                            очистить
                        </button>
                    </div>

                    <ul id="history-list" class="rounded-2xl overflow-hidden border border-gray-200 bg-white">

                        <li class="text-center text-gray-400 py-6 text-sm">
                            пусто
                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
